<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WisCode 原型导航</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            padding: 48px;
            max-width: 520px;
            width: 100%;
        }
        h1 {
            font-size: 24px;
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        p.subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 32px;
        }
        .nav-list { list-style: none; }
        .nav-list li { margin-bottom: 16px; }
        .nav-list a {
            display: flex;
            align-items: center;
            padding: 18px 20px;
            border: 1px solid #e8e8ef;
            border-radius: 12px;
            text-decoration: none;
            color: #333;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .nav-list a:hover {
            border-color: #667eea;
            background: #f5f6ff;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(102,126,234,0.15);
        }
        .icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            font-size: 20px;
        }
        .icon-1 { background: #eef0ff; }
        .icon-2 { background: #e8f7f0; }
        .icon-3 { background: #fff4e6; }
        .arrow { margin-left: auto; color: #bbb; }
    </style>
</head>
<body>
    <div class="container">
        <h1>WisCode 原型导航</h1>
        <p class="subtitle">智企 AI 计划相关原型页面</p>
        <ul class="nav-list">
            <li>
                <a href="智企AI计划.html">
                    <span class="icon icon-1">🤖</span>
                    智企 AI 计划
                    <span class="arrow">→</span>
                </a>
            </li>
            <li>
                <a href="模型套餐.html">
                    <span class="icon icon-2">📦</span>
                    模型套餐
                    <span class="arrow">→</span>
                </a>
            </li>
            <li>
                <a href="用量.html">
                    <span class="icon icon-3">📊</span>
                    用量
                    <span class="arrow">→</span>
                </a>
            </li>
        </ul>
    </div>
</body>
</html>
